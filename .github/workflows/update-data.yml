name: Update market data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 13-22 * * 1-5"
    - cron: "20 0 * * 2-6"

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch Yahoo Finance data
        run: python scripts/update_data.py
      - name: Commit data changes to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market.json
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "Update market data"
            git push
          fi
      - name: Publish updated static site to gh-pages
        run: |
          rm -rf /tmp/ndx-pages
          git worktree add /tmp/ndx-pages gh-pages
          rsync -a --delete \
            --exclude='.git' \
            index.html .nojekyll data/ /tmp/ndx-pages/
          cd /tmp/ndx-pages
          git add .
          if git diff --cached --quiet; then
            echo "No Pages changes"
          else
            git commit -m "Update Pages market data"
            git push origin gh-pages
          fi
